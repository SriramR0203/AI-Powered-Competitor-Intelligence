services:
  # ── Spring Boot Web Service ─────────────────────────────────────────────────
  - type: web
    name: competitor-intel-api

    # runtime: docker — Render builds the Dockerfile and runs the resulting
    # image.  This bundles Java 21, curl, the non-root user, and the
    # HEALTHCHECK into one reproducible artifact.
    runtime: docker
    dockerfilePath: ./Dockerfile

    plan: free
    region: oregon

    healthCheckPath: /actuator/health

    envVars:
      # ── Spring ──────────────────────────────────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ── Database (Neon PostgreSQL) ────────────────────────────────────────
      # Paste the JDBC connection string from your Neon dashboard:
      #   Project → Connection Details → Connection string → JDBC
      # Format: jdbc:postgresql://<host>/<db>?user=<user>&password=<pass>&sslmode=require
      #
      # Set this in Render Dashboard → Service → Environment — never commit
      # the real value.  No DATABASE_URL conversion is needed; Neon provides
      # a ready-to-use JDBC URL.
      - key: SPRING_DATASOURCE_URL
        sync: false

      # ── JWT ──────────────────────────────────────────────────────────────────
      # REQUIRED. Generate: openssl rand -base64 64
      # Set via Render dashboard — never commit the real value.
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRATION
        value: "86400000"

      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"

      # ── CORS ──────────────────────────────────────────────────────────────────
      # REQUIRED after the frontend is deployed.
      # Set to your Vercel frontend URL, e.g.: https://competitor-intel.vercel.app
      # Comma-separate multiple origins: https://a.vercel.app,https://custom.com
      - key: ALLOWED_ORIGINS
        sync: false

      # ── OpenAPI / Swagger ─────────────────────────────────────────────────────
      # Set to this service's Render URL so Swagger UI points to itself.
      # e.g.: https://competitor-intel-api.onrender.com
      - key: API_BASE_URL
        sync: false

      # ── AI (optional) ─────────────────────────────────────────────────────────
      # Leave AI_PROVIDER=mock to use built-in mock enrichment (no key needed).
      - key: AI_PROVIDER
        value: mock

      - key: OPENAI_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      # ── Mail (optional) ───────────────────────────────────────────────────────
      # Leave MAIL_HOST unset to disable email delivery.  The mail health check
      # is disabled in application-prod.yml so a missing host will NOT cause the
      # /actuator/health probe to fail.
      - key: MAIL_HOST
        sync: false

      - key: MAIL_PORT
        value: "587"

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

# No managed database block — the project uses an external Neon PostgreSQL
# instance.  Supply SPRING_DATASOURCE_URL in the environment variables above.
