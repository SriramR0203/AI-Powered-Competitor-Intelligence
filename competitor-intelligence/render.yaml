services:
  # ── Spring Boot Web Service ─────────────────────────────────────────────────
  - type: web
    name: competitor-intel-api

    # runtime: docker — Render builds the repo-root Dockerfile and runs the
    # resulting image.  This is the correct choice when a Dockerfile is present:
    # it bundles Java 21, curl, the non-root user, start.sh URL conversion, and
    # the HEALTHCHECK into one reproducible artifact.
    #
    # Do NOT use runtime: java alongside a Dockerfile — the two are mutually
    # exclusive on Render and java-runtime ignores the Dockerfile entirely.
    runtime: docker
    dockerfilePath: ./Dockerfile

    plan: free
    region: oregon

    healthCheckPath: /actuator/health

    envVars:
      # ── Spring ──────────────────────────────────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ── Database ─────────────────────────────────────────────────────────────
      # Render injects DATABASE_URL automatically when a PostgreSQL instance is
      # attached.  The Dockerfile ENTRYPOINT runs start.sh which converts the
      # postgres:// scheme to jdbc:postgresql:// before the JVM starts.
      - key: DATABASE_URL
        fromDatabase:
          name: competitor-intel-db
          property: connectionString

      # ── JWT ──────────────────────────────────────────────────────────────────
      # REQUIRED. Generate: openssl rand -base64 64
      # Set via Render dashboard Environment tab — never commit the real value.
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRATION
        value: "86400000"

      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"

      # ── CORS ──────────────────────────────────────────────────────────────────
      # REQUIRED after frontend is deployed.
      # Set to your Vercel frontend URL, e.g.: https://competitor-intel.vercel.app
      # Comma-separate multiple origins: https://a.vercel.app,https://custom.com
      - key: ALLOWED_ORIGINS
        sync: false

      # ── OpenAPI / Swagger ─────────────────────────────────────────────────────
      # Set to this service's Render URL so Swagger UI points to itself.
      # e.g.: https://competitor-intel-api.onrender.com
      - key: API_BASE_URL
        sync: false

      # ── AI (optional) ─────────────────────────────────────────────────────────
      # Leave AI_PROVIDER=mock to use the built-in mock enrichment (no key needed).
      - key: AI_PROVIDER
        value: mock

      - key: OPENAI_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      # ── Mail (optional) ───────────────────────────────────────────────────────
      # Leave MAIL_HOST unset to disable email delivery.  The mail health check
      # is already disabled in application-prod.yml so a missing host will NOT
      # cause the /actuator/health probe to fail.
      - key: MAIL_HOST
        sync: false

      - key: MAIL_PORT
        value: "587"

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

# ── Managed PostgreSQL Database ───────────────────────────────────────────────
databases:
  - name: competitor-intel-db
    plan: free
    region: oregon
    databaseName: competitor_intel
    user: competitor_user
