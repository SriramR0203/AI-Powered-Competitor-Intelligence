# ─────────────────────────────────────────────────────────────────────────────
# Test profile — H2 in-memory, mail auto-configuration excluded,
# schedulers disabled so tests run fast and in isolation.
# ─────────────────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

app:
  jwt:
    secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-security-tests
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  ai:
    provider: mock
  scheduler:
    scraping-cron: "-"
    alert-cron: "-"
    cleanup-cron: "-"

management:
  health:
    mail:
      enabled: false
