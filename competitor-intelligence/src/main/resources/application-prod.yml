# ─────────────────────────────────────────────────────────────────────────────
# Production profile — Neon PostgreSQL, all values from environment variables.
#
# SPRING_DATASOURCE_URL must be set in the Render environment to the JDBC
# connection string copied from the Neon dashboard:
#   Project → Connection Details → Connection string → JDBC
#   Format: jdbc:postgresql://<host>/<db>?user=<user>&password=<pass>&sslmode=require
#
# No DATABASE_URL conversion is required — Neon provides a ready-to-use JDBC
# URL.  The individual DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD
# vars are kept as a fallback for non-Neon environments only.
# ─────────────────────────────────────────────────────────────────────────────
spring:

  # ── Disable H2 entirely in production ──────────────────────────────────────
  h2:
    console:
      enabled: false

  # ── Neon PostgreSQL datasource ───────────────────────────────────────────────
  # Primary: SPRING_DATASOURCE_URL — the full JDBC URL from Neon (includes
  # credentials and sslmode=require in the query string, so username/password
  # properties below are only needed when using the individual-field fallback).
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:competitor_intel}}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # ── Flyway — PostgreSQL migration scripts ───────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration-postgresql
    baseline-on-migrate: true
    default-schema: public

  # ── Mail ─────────────────────────────────────────────────────────────────────
  # MAIL_HOST is optional — leave it unset to skip email delivery entirely.
  # When unset, the mail health indicator is disabled below so the /actuator/health
  # endpoint does not report DOWN due to a missing SMTP server.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Thymeleaf — enable template caching in production ──────────────────────
  thymeleaf:
    cache: true

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  # Required when running behind Render's TLS-terminating reverse proxy so that
  # Spring correctly reconstructs HTTPS URLs (redirects, Swagger server list, etc.)
  forward-headers-strategy: native

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # Never expose internal details publicly in production.
      show-details: never
  health:
    # Disable mail health check — SMTP is optional; a missing host must not
    # cause the Render health probe to fail and trigger a restart loop.
    mail:
      enabled: false
    # Disable H2 health check — H2 is not on the prod classpath path.
    db:
      # Spring will still check the *configured* DataSource (PostgreSQL).
      # This entry is here as documentation; the default is enabled=true.
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.competitorintel: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
