<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitor Intelligence Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-graph-up-arrow me-2"></i>Competitor Intel
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/swagger-ui.html" target="_blank">
                <i class="bi bi-code-slash me-1"></i>API Docs
            </a>
            <span class="nav-link text-secondary" sec:authentication="name">User</span>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col">
            <h2 class="fw-bold">Dashboard</h2>
            <p class="text-muted">Real-time competitor intelligence overview</p>
        </div>
        <div class="col-auto">
            <select class="form-select" id="dayRange" onchange="loadDashboard(this.value)">
                <option value="7">Last 7 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="90">Last 90 days</option>
            </select>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="row g-3 mb-4" id="kpiCards">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-building fs-2 text-primary"></i>
                    <h3 class="mt-2 fw-bold" id="kpiCompetitors">--</h3>
                    <p class="text-muted mb-0 small">Active Competitors</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-newspaper fs-2 text-success"></i>
                    <h3 class="mt-2 fw-bold" id="kpiEvents30d">--</h3>
                    <p class="text-muted mb-0 small">Events (30d)</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-robot fs-2 text-warning"></i>
                    <h3 class="mt-2 fw-bold" id="kpiEnriched">--</h3>
                    <p class="text-muted mb-0 small">AI Enriched</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-bell-fill fs-2 text-danger"></i>
                    <h3 class="mt-2 fw-bold" id="kpiAlerts">--</h3>
                    <p class="text-muted mb-0 small">Pending Alerts</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-transparent fw-semibold">Events by Category</div>
                <div class="card-body"><canvas id="categoryChart" height="220"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-transparent fw-semibold">Sentiment Distribution</div>
                <div class="card-body"><canvas id="sentimentChart" height="220"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Top Competitors Table -->
    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent fw-semibold d-flex justify-content-between">
                    <span>Top Competitors by Activity</span>
                    <a href="/api/v1/competitors" class="btn btn-sm btn-outline-primary">View All</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Competitor</th><th>Events</th><th>Action</th></tr>
                        </thead>
                        <tbody id="topCompetitorsTable">
                            <tr><td colspan="3" class="text-center py-3 text-muted">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
