spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: competitor-intelligence-platform
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  # Thymeleaf cache is OFF by default so the dev profile gets live reloads.
  # application-prod.yml overrides this to true.
  thymeleaf:
    cache: false
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        # Base exposes health + info only; prod profile keeps the same set.
        # metrics is deliberately omitted from the public base to avoid
        # exposing internal counters without authentication.
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

app:
  jwt:
    # Production MUST override JWT_SECRET via the RENDER environment variable.
    # The fallback value below is intentionally weak and dev-only — the app
    # will start locally without requiring any env setup.
    secret: ${JWT_SECRET:dev-only-jwt-secret-key-do-not-use-in-production-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  ai:
    provider: ${AI_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
  scraping:
    user-agent: "Mozilla/5.0 (compatible; CompetitorIntelBot/1.0)"
    timeout-ms: 10000
    max-retries: 3
  scheduler:
    scraping-cron: "0 0 */6 * * *"
    alert-cron: "0 */30 * * * *"
    cleanup-cron: "0 0 2 * * *"
  cors:
    # Comma-separated allowed origins.
    # Local dev (*) allows all origins.
    # Production (Render): set ALLOWED_ORIGINS to your Vercel frontend URL.
    # Multiple: https://a.vercel.app,https://custom-domain.com
    allowed-origins: ${ALLOWED_ORIGINS:*}

# Base logging — conservative defaults.
# application-dev.yml promotes com.competitorintel to DEBUG and enables SQL logging.
# application-prod.yml keeps these levels or tightens them further.
logging:
  level:
    root: WARN
    com.competitorintel: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
