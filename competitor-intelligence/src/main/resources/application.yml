spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: competitor-intelligence-platform
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

app:
  jwt:
    # Production: override JWT_SECRET with a real 64-char secret via environment variable.
    # Development: falls back to the dev-only secret defined in application-dev.yml.
    # The fallback here ensures the app starts in dev without requiring any env vars.
    secret: ${JWT_SECRET:dev-only-jwt-secret-key-do-not-use-in-production-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  ai:
    provider: ${AI_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
  scraping:
    user-agent: "Mozilla/5.0 (compatible; CompetitorIntelBot/1.0)"
    timeout-ms: 10000
    max-retries: 3
  scheduler:
    scraping-cron: "0 0 */6 * * *"
    alert-cron: "0 */30 * * * *"
    cleanup-cron: "0 0 2 * * *"

logging:
  level:
    com.competitorintel: DEBUG
    org.springframework.security: INFO
