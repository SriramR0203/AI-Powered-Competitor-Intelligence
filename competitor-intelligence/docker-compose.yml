version: "3.9"

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ci_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE:      competitor_intel
      MYSQL_USER:          compuser
      MYSQL_PASSWORD:      comppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucompuser", "-pcomppass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: ci_app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST:                mysql
      DB_PORT:                "3306"
      DB_NAME:                competitor_intel
      DB_USERNAME:            compuser
      DB_PASSWORD:            comppass
      JWT_SECRET:             "${JWT_SECRET:-change-me-in-production-min-256-bits}"
      AI_PROVIDER:            "${AI_PROVIDER:-mock}"
      OPENAI_API_KEY:         "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY:         "${GEMINI_API_KEY:-}"
      MAIL_HOST:              "${MAIL_HOST:-mailhog}"
      MAIL_PORT:              "${MAIL_PORT:-1025}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MailHog (dev email catcher) ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ci_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
